<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daniele Summit — UI Kit</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050818; color: #f0f4ff; font-family: 'Inter', sans-serif; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 60px 5vw; display: flex; flex-direction: column; gap: 4rem; }
    .kit-section h2.kit-title { font-family: 'Space Grotesk'; font-size: 1.6rem; font-weight: 700;
      letter-spacing: -0.03em; margin: 0.6rem 0 1.5rem; }
    .grid { display: grid; gap: 1.5rem; }
    .g4 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .g5 { grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); }
    .sched { border: 1px solid rgba(120,140,255,0.15); border-radius: 20px; overflow: hidden; }
    .form-box { max-width: 620px; background: rgba(10,14,40,0.7); border: 1px solid rgba(120,140,255,0.15);
      border-radius: 24px; padding: 2.5rem; backdrop-filter: blur(12px); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-bottom: 1.2rem; }
    @media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel">
    const { useState } = React;

    function HeroDemo() {
      return (
        <div className="kit-section">
          <Eyebrow>Hero</Eyebrow>
          <h1 style={{ fontFamily: T.display, fontWeight: 700, fontSize: 'clamp(2.4rem,6vw,4.5rem)',
            letterSpacing: '-0.04em', lineHeight: 1.0, margin: '1rem 0' }}>
            O futuro é <GradientText>inteligente.</GradientText><br />O presente, também.
          </h1>
          <p style={{ color: T.muted, fontSize: '1.1rem', maxWidth: 560, marginBottom: '1rem' }}>
            Um evento presencial para quem quer aplicar IA de verdade nos negócios.
          </p>
          <p style={{ fontFamily: T.display, fontStyle: 'italic', color: T.blue, marginBottom: '1.8rem' }}>
            "IA não resolve sua falta de repertório."
          </p>
          <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap' }}>
            <Button>Garantir minha vaga →</Button>
            <Button variant="secondary">Ver programação</Button>
          </div>
        </div>
      );
    }

    function AudienceDemo() {
      const data = [
        ['💼', 'Empreendedores', 'Que querem automatizar processos e crescer com mais inteligência.'],
        ['👩‍💻', 'Profissionais', 'Gestores e líderes que precisam entender o impacto da IA nos times.'],
        ['🚀', 'Founders', 'Quem precisa de repertório real — não só hype — para decidir melhor.'],
        ['🎯', 'Curiosos', 'Quem já percebeu que ficar de fora da IA é caro demais.'],
      ];
      return (
        <div className="kit-section">
          <Eyebrow>Para quem é</Eyebrow>
          <h2 className="kit-title">Cards de público</h2>
          <div className="grid g4">
            {data.map(([i, t, d]) => <Card key={t} icon={i} title={t}>{d}</Card>)}
          </div>
        </div>
      );
    }

    function ScheduleDemo() {
      return (
        <div className="kit-section">
          <Eyebrow>Programação</Eyebrow>
          <h2 className="kit-title">Linha do tempo</h2>
          <div className="sched">
            <ScheduleItem time="14h20" tag="Palestra 1" title="IA Aplicada: por onde começar"
              desc="Cases reais de quem usa IA para crescer — sem precisar programar." />
            <ScheduleItem time="16h00" tag="Networking" tone="purple" title="Intervalo de Networking"
              desc="40 minutos para conectar e trocar referências." />
            <ScheduleItem time="16h40" tag="Palestra 3" title="Inovação que Permanece"
              desc="Como construir cultura de inovação além do hype." />
          </div>
        </div>
      );
    }

    function SpeakersDemo() {
      const s = [
        ['DK', 'Daniele Kretli', 'Fundadora & CEO', 'DKs Tech'],
        ['P2', 'Palestrante 2', 'Especialista em IA', 'A confirmar'],
        ['P3', 'Palestrante 3', 'Empreendedor', 'A confirmar'],
        ['P4', 'Palestrante 4', 'Gestora de Inovação', 'A confirmar'],
      ];
      return (
        <div className="kit-section">
          <Eyebrow>Palestrantes</Eyebrow>
          <h2 className="kit-title">Cards de palestrante</h2>
          <div className="grid g5">
            {s.map(([i, n, r, c]) => <SpeakerCard key={n} initials={i} name={n} role={r} company={c} />)}
          </div>
        </div>
      );
    }

    function FormDemo() {
      const [v, setV] = useState({ nome: '', email: '', tel: '', cargo: '' });
      const [done, setDone] = useState(false);
      const set = k => e => setV({ ...v, [k]: e.target.value });
      return (
        <div className="kit-section">
          <Eyebrow>Inscrição</Eyebrow>
          <h2 className="kit-title">Formulário</h2>
          <div className="form-box">
            {done ? (
              <div style={{ textAlign: 'center', padding: '1.5rem 0' }}>
                <div style={{ width: 64, height: 64, borderRadius: '50%', margin: '0 auto 1.2rem',
                  background: T.grad, display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: '1.6rem', boxShadow: '0 0 40px rgba(100,100,255,.4)' }}>✓</div>
                <h3 style={{ fontFamily: T.display, fontSize: '1.4rem', marginBottom: '0.6rem' }}>Inscrição recebida!</h3>
                <p style={{ color: T.muted }}>Você receberá a confirmação por e-mail.</p>
              </div>
            ) : (
              <React.Fragment>
                <div className="form-row">
                  <Field label="Nome completo" required value={v.nome} onChange={set('nome')} placeholder="Seu nome" />
                  <Field label="E-mail" type="email" required value={v.email} onChange={set('email')} placeholder="seu@email.com" />
                </div>
                <div className="form-row">
                  <Field label="Telefone" required value={v.tel} onChange={set('tel')} placeholder="(11) 99999-9999" />
                  <Field label="Cargo" required value={v.cargo} onChange={set('cargo')} placeholder="Ex: CEO, Gerente" />
                </div>
                <div style={{ marginTop: '0.5rem' }}>
                  <button onClick={() => setDone(true)} style={{ width: '100%', background: T.grad,
                    color: '#fff', border: 'none', borderRadius: 50, padding: 16, fontFamily: T.body,
                    fontSize: '1rem', fontWeight: 600, cursor: 'pointer', boxShadow: '0 0 40px rgba(100,100,255,.25)' }}>
                    Garantir minha vaga gratuita →
                  </button>
                </div>
              </React.Fragment>
            )}
          </div>
        </div>
      );
    }

    function App() {
      return (
        <div className="wrap">
          <div>
            <Eyebrow>Daniele Summit · UI Kit</Eyebrow>
            <h1 style={{ fontFamily: T.display, fontSize: '2rem', fontWeight: 700,
              letterSpacing: '-0.03em', marginTop: '0.5rem' }}>Componentes da landing</h1>
          </div>
          <HeroDemo />
          <NeonDivider />
          <AudienceDemo />
          <NeonDivider />
          <ScheduleDemo />
          <NeonDivider />
          <SpeakersDemo />
          <NeonDivider />
          <FormDemo />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
