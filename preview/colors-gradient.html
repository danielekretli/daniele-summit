<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050818;color:#f0f4ff;font-family:'Inter',sans-serif;padding:22px 26px;}
.disp{font-family:'Space Grotesk',sans-serif}
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:10px}
.lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#7a85a8}
</style></head><body>
<div class="col">
<span class="lbl">Gradiente de marca · azul → roxo → magenta</span>
<div style="height:60px;border-radius:14px;background:linear-gradient(90deg,oklch(0.72 0.22 220),oklch(0.72 0.22 290) 70%,#ff6af0)"></div>
<div style="height:2px;border-radius:99px;background:linear-gradient(90deg,transparent,oklch(0.72 0.22 220),oklch(0.72 0.22 290),transparent);opacity:.6;margin-top:6px"></div>
<span class="lbl">↑ separador neon (opacity .4)</span>
</div></body></html>
