<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050818;color:#f0f4ff;font-family:'Inter',sans-serif;padding:22px 26px;}
.disp{font-family:'Space Grotesk',sans-serif}
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:10px}
.lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#7a85a8}
</style></head><body>
<div class="col" style="gap:16px">
<div><span class="lbl">Badge / tag</span><div class="row" style="margin-top:10px;gap:10px">
  <span style="font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:50px;background:rgba(100,140,255,.12);border:1px solid rgba(100,140,255,.2);color:oklch(0.72 0.22 220)">Palestra 1</span>
  <span style="font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:50px;background:rgba(180,80,255,.12);border:1px solid rgba(180,80,255,.2);color:oklch(0.72 0.22 290)">Networking</span>
</div></div>
<div><span class="lbl">Chip</span><div class="row" style="margin-top:10px;gap:10px">
  <span style="font-size:13px;padding:6px 14px;border-radius:50px;background:rgba(0,180,255,.08);border:1px solid rgba(0,180,255,.18);color:oklch(0.72 0.22 220)">🚇 Metrô Carandiru</span>
  <span style="font-size:13px;padding:6px 14px;border-radius:50px;background:rgba(0,180,255,.08);border:1px solid rgba(0,180,255,.18);color:oklch(0.72 0.22 220)">♿ Acessível</span>
</div></div>
</div></body></html>
