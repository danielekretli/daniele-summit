<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050818;color:#f0f4ff;font-family:'Inter',sans-serif;padding:22px 26px;}
.disp{font-family:'Space Grotesk',sans-serif}
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:10px}
.lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#7a85a8}
</style></head><body>
<span class="lbl" style="display:block;margin-bottom:14px">Texto & linhas</span>
<div class="row" style="gap:18px">
  <div class="col" style="gap:6px"><div style="width:88px;height:64px;border-radius:12px;background:#f0f4ff;border:1px solid rgba(120,140,255,.18)"></div><div style="font-size:12px;font-weight:600">Texto</div><div style="font-size:11px;color:#7a85a8;font-family:monospace">#f0f4ff</div></div>
  <div class="col" style="gap:6px"><div style="width:88px;height:64px;border-radius:12px;background:#7a85a8;border:1px solid rgba(120,140,255,.18)"></div><div style="font-size:12px;font-weight:600">Muted</div><div style="font-size:11px;color:#7a85a8;font-family:monospace">#7a85a8</div></div>
  <div class="col" style="gap:6px"><div style="width:88px;height:64px;border-radius:12px;background:rgba(120,140,255,.15);border:1px solid rgba(120,140,255,.18)"></div><div style="font-size:12px;font-weight:600">Borda</div><div style="font-size:11px;color:#7a85a8;font-family:monospace">rgba .15</div></div>
  <div class="col" style="gap:6px"><div style="width:88px;height:64px;border-radius:12px;background:rgba(100,140,255,.4);border:1px solid rgba(120,140,255,.18)"></div><div style="font-size:12px;font-weight:600">Borda hover</div><div style="font-size:11px;color:#7a85a8;font-family:monospace">rgba .4</div></div>
</div></body></html>
