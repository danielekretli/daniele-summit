<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050818;color:#f0f4ff;font-family:'Inter',sans-serif;padding:22px 26px;}
.disp{font-family:'Space Grotesk',sans-serif}
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:10px}
.lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#7a85a8}
</style></head><body>
<span class="lbl" style="display:block;margin-bottom:14px">Raio de canto</span>
<div class="row" style="gap:18px;align-items:flex-end">
  <div class="col" style="gap:6px;align-items:center"><div style="width:70px;height:48px;border-radius:50px;background:rgba(100,140,255,.12);border:1px solid rgba(120,140,255,.25)"></div><span style="font-size:11px;color:#7a85a8">pill 50</span></div>
  <div class="col" style="gap:6px;align-items:center"><div style="width:70px;height:48px;border-radius:10px;background:rgba(100,140,255,.12);border:1px solid rgba(120,140,255,.25)"></div><span style="font-size:11px;color:#7a85a8">sm 10</span></div>
  <div class="col" style="gap:6px;align-items:center"><div style="width:70px;height:48px;border-radius:16px;background:rgba(100,140,255,.12);border:1px solid rgba(120,140,255,.25)"></div><span style="font-size:11px;color:#7a85a8">md 16</span></div>
  <div class="col" style="gap:6px;align-items:center"><div style="width:70px;height:48px;border-radius:24px;background:rgba(100,140,255,.12);border:1px solid rgba(120,140,255,.25)"></div><span style="font-size:11px;color:#7a85a8">xl 24</span></div>
</div></body></html>
