<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050818;color:#f0f4ff;font-family:'Inter',sans-serif;padding:22px 26px;}
.disp{font-family:'Space Grotesk',sans-serif}
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:10px}
.lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#7a85a8}
</style></head><body>
<span class="lbl" style="display:block;margin-bottom:14px">Acentos neon</span>
<div class="row" style="gap:18px">
  <div class="col" style="gap:6px"><div style="width:88px;height:64px;border-radius:12px;background:oklch(0.72 0.22 220);border:1px solid rgba(120,140,255,.18)"></div><div style="font-size:12px;font-weight:600">Blue</div><div style="font-size:11px;color:#7a85a8;font-family:monospace">oklch .72 .22 220</div></div>
  <div class="col" style="gap:6px"><div style="width:88px;height:64px;border-radius:12px;background:oklch(0.72 0.22 290);border:1px solid rgba(120,140,255,.18)"></div><div style="font-size:12px;font-weight:600">Purple</div><div style="font-size:11px;color:#7a85a8;font-family:monospace">oklch .72 .22 290</div></div>
  <div class="col" style="gap:6px"><div style="width:88px;height:64px;border-radius:12px;background:#ff6af0;border:1px solid rgba(120,140,255,.18)"></div><div style="font-size:12px;font-weight:600">Magenta</div><div style="font-size:11px;color:#7a85a8;font-family:monospace">#ff6af0</div></div>
  <div class="col" style="gap:6px"><div style="width:88px;height:64px;border-radius:12px;background:linear-gradient(135deg,oklch(0.72 0.22 220),oklch(0.72 0.22 290));border:1px solid rgba(120,140,255,.18)"></div><div style="font-size:12px;font-weight:600">Gradiente</div><div style="font-size:11px;color:#7a85a8;font-family:monospace">135° brand</div></div>
</div></body></html>
